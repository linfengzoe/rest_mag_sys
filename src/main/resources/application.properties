# 服务端口
server.port=8081

spring.application.name=rest_mag_sys

# 数据源配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/rest_mag_sys?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=1193217659

# Druid连接池配置
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20

# H2控制台配置 - 如果不需要可以删除或注释掉
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.h2.console.settings.web-allow-others=true

# 初始化数据库
# 只在数据库不存在时执行初始化脚本
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.sql.init.mode=embedded
spring.sql.init.encoding=UTF-8
spring.sql.init.platform=mysql
# 不自动创建/删除表
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.continue-on-error=false

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.rest_mag_sys.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.path=D:/rest_sys/upload/images/

# 静态资源访问配置
spring.web.resources.static-locations=classpath:/static/,file:upload/

# 日志配置
logging.level.root=info
logging.level.com.rest_mag_sys=debug
logging.level.com.rest_mag_sys.mapper=debug
logging.level.sql=debug

# 时区设置
spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# JWT配置
jwt.secret-key=restaurantManagementSystem
jwt.expiration=86400000

# 字符编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

# DeepSeek LLM配置
llm.deepseek.base-url=https://api.deepseek.com/v1
llm.deepseek.api-key=${DEEPSEEK_API_KEY:}
llm.deepseek.model=deepseek-chat
llm.deepseek.temperature=0.2
llm.deepseek.max-tokens=2000
